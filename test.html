<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style_quiz.css') }}">
    <title>Quiz</title>
</head>
<body>
    <main class="card">
        <h1>{{ question }}</h1>
        <form method="post" action="{{ url_for('test') }}">
            <input type="hidden" name="q_id" value="{{ quest_id }}">

            <div class="answers">
                {% for answer in answers_list %}
                    <label class="answer">
                        <input type="radio" name="ans_text" value="{{ answer }}" required>
                        <span>{{ answer }}</span>
                    </label>
                {% endfor %}
            </div>

            <input type="submit" value="Answer">
        </form>
    </main>
</body>
</html>
